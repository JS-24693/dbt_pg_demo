version: 2
sources:
  - name: raw
    schema: demo_project
    loaded_at_field: updated_at

    config:
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour}

    tables:
      - name: raw_orders
        description: "Raw order data loaded directly into the warehouse."
        columns:
          - name: order_id
            description: "Unique identifier for each order."
            tests:
              - not_null
              - unique
          - name: order_date
            description: "Date the order was placed."
            tests:
              - not_null
          - name: customer_id
            description: "Identifier for the customer placing the order."
            tests:
              - not_null
          - name: order_amount
            description: "Monetary amount of the order."
            tests:
              - not_null             
          - name: status
            description: "Order lifecycle status."
            tests:
              - not_null
          - name: updated_at
            description: "Timestamp indicating when the order record was last updated."
            tests:
              - updated_at_validation:
                  column_name: updated_at

      - name: raw_customers
        description: "Raw customer data loaded directly into the warehouse."
        columns:
          - name: customer_id
            description: "Unique identifier for each customer."
            tests:
              - not_null
              - unique
          - name: customer_name
            description: "Name of the customer."
            tests:
              - not_null        
          - name: updated_at
            description: "Timestamp indicating when the customer record was last updated."
            tests:
              - updated_at_validation:
                  column_name: updated_at
