name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    
jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          dev:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.DBT_HOST }}
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                port: ${{ secrets.DBT_PORT }}
                dbname: ${{ secrets.DBT_DBNAME }}
                schema: public
          EOF

      - name: Run dbt build
        working-directory: ./demo_project
        run: |
          dbt --version
          dbt debug || true   
          dbt build 
      
      - name: Upload dbt artifacts (logs + target)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            demo_project/logs/
            demo_project/target/