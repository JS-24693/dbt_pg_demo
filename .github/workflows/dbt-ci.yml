name: dbt CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Print directory tree (absolute path)
        run: |
          echo "=== RUNNER WORKSPACE ==="
          echo "${{ github.workspace }}"
          echo "=== LISTING WORKSPACE ROOT ==="
          ls -R ${{ github.workspace }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt-postgres
        run: pip install dbt-postgres

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          demo_project:
            target: dev
            outputs:
              dev:
                type: postgres
                host: $DBT_HOST
                user: $DBT_USER
                password: $DBT_PASSWORD
                port: $DBT_PORT
                dbname: $DBT_DBNAME
                schema: public
          EOF
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PORT: ${{ secrets.DBT_PORT }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

      - name: Run dbt build
        run: |
          dbt --version
          dbt debug
          dbt seed
          dbt build

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            logs/
            target/